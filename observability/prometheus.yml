# Prometheus scrape configuration for the Event Ledger services.
#
# Prometheus pulls (scrapes) the /metrics endpoint of each service on an
# interval and stores the samples in its time-series database. Grafana then
# queries Prometheus to draw dashboards. This is the metrics pillar; tracing is
# handled separately by Jaeger.
#
# Service names below (event-gateway, account-service) resolve over the compose
# network. Both expose /metrics on their application port.

global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: event-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["event-gateway:5000"]
        labels:
          service: event-gateway

  - job_name: account-service
    metrics_path: /metrics
    static_configs:
      - targets: ["account-service:5001"]
        labels:
          service: account-service
